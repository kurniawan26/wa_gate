services:
  wa_gate:
    build: .
    container_name: wa_gate_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PHX_HOST=${PHX_HOST:-localhost}
      - PHX_SCHEME=${PHX_SCHEME:-http}
      - PORT=4000
      - DATABASE_URL=ecto://myuser:mypassword@postgres/mydb
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - EVOLUTION_API_URL=http://wa_engine:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-lt67scX4Hbodj0kpaQYW8MPPIEoh94qpcvkU5COaiec=}
      - APP_API_KEY=${APP_API_KEY:-dev-secret-key}
      - POOL_SIZE=10
    ports:
      - "4000:4000"

  postgres:
    image: postgres:16-alpine
    container_name: wa_gate_db
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  wa_engine:
    image: evoapicloud/evolution-api:latest
    container_name: wa_gate_engine
    restart: always
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-lt67scX4Hbodj0kpaQYW8MPPIEoh94qpcvkU5COaiec=}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - CACHE_REDIS_ENABLED=false
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://wa_gate:4000/api/webhooks/whatsapp
    ports:
      - "8081:8080"
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  postgres_data:
  evolution_instances:
