services:
  wa_engine:
    image: atendai/evolution-api:v1.8.7
    container_name: wa_gate_engine
    restart: always
    environment:
      - AUTHENTICATION_API_KEY=lt67scX4Hbodj0kpaQYW8MPPIEoh94qpcvkU5COaiec=
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - CACHE_REDIS_ENABLED=false
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:4000/api/webhooks/whatsapp
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  postgres_data:
  evolution_instances:
