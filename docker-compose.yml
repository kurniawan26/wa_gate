services:
  wa_gate:
    build: .
    container_name: wa_gate_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PHX_HOST=${PHX_HOST:-localhost}
      - PHX_SCHEME=${PHX_SCHEME:-http}
      - PORT=4000
      - DATABASE_URL=ecto://myuser:mypassword@postgres/mydb
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WAHA_API_URL=http://wa_engine:3000
      - WAHA_API_KEY=${WAHA_API_KEY:-changeme}
      - WEBHOOK_URL=http://172.30.0.2:4000/api/webhooks/whatsapp
      - APP_API_KEY=${APP_API_KEY:-dev-secret-key}
      - POOL_SIZE=${POOL_SIZE:-10}
    ports:
      - "4000:4000"
    networks:
      wa_net:
        ipv4_address: 172.30.0.2

  postgres:
    image: postgres:16-alpine
    container_name: wa_gate_db
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      wa_net:
        ipv4_address: 172.30.0.3

  wa_engine:
    image: devlikeapro/waha
    container_name: wa_gate_engine
    restart: always
    environment:
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-changeme}
    ports:
      - "3000:3000"
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      wa_net:
        ipv4_address: 172.30.0.4

networks:
  wa_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data:
  waha_sessions:
